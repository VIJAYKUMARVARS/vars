<!DOCTYPE html>
<html>
<head>
<title>VarsChat 💬</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:sans-serif;background:#e5ddd5}

/* LOGIN */
#authBox{
 position:fixed;inset:0;
 display:flex;justify-content:center;align-items:center;
 background:#e5ddd5;
}
.card{
 width:320px;background:#fff;padding:20px;border-radius:12px;text-align:center;
}
input{
 width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;background:#f0f2f5;
}
/* login/signup buttons only */
.card button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:8px;
 background:#00a884;
 color:white;
}

/* 🔥 logout button final fix */
#logoutBtn{
 width:auto !important;
 padding:5px 14px !important;
 border-radius:20px !important;
 font-size:12px;
 background:#00a884;
 color:white;
 cursor:pointer;
}

/* MAIN */
#main{display:none;height:100vh;display:flex}

/* SIDEBAR */
#sidebar{
 width:300px;background:#fff;border-right:1px solid #ddd;
}
.user{
 display:flex;align-items:center;gap:10px;
 padding:12px;border-bottom:1px solid #eee;cursor:pointer;
}
.user:hover{background:#f5f5f5}

/* AVATAR */
.avatar{
 width:40px;height:40px;border-radius:50%;
 background:#00a884;color:white;
 display:flex;align-items:center;justify-content:center;font-weight:bold;
}

/* ONLINE DOT */
.dot{
 width:10px;height:10px;background:#25d366;border-radius:50%;
}

/* CHAT */
#chatArea{flex:1;display:flex;flex-direction:column}

#topbar{
 display:flex;justify-content:space-between;align-items:center;
 padding:10px;background:#f0f2f5;border-bottom:1px solid #ddd;
}

/* SMALL LOGOUT BUTTON */
#logoutBtn{
 padding:5px 12px;
 border-radius:20px;
 border:none;
 background:#00a884;
 color:white;
 font-size:12px;
 cursor:pointer;
}

#status{font-size:12px;color:#667781}

#chat{
 flex:1;overflow:auto;padding:15px;background:#efeae2;
}

/* MESSAGE */
.msg{
 max-width:70%;
 padding:10px;
 margin:5px;
 border-radius:10px;
 font-size:14px;
}

.me{
 background:#d9fdd3;
 margin-left:auto;
 border-radius:10px 10px 0 10px;
}

.other{
 background:#fff;
 margin-right:auto;
 border-radius:10px 10px 10px 0;
}

.meta{
 font-size:10px;color:#667781;margin-top:3px;
}

/* INPUT */
#inputBox{
 display:flex;align-items:center;
 padding:10px;background:#f0f2f5;gap:10px;
}

#msg{
 flex:1;padding:10px 15px;border-radius:25px;border:none;
}

#sendBtn{
 width:45px;height:45px;
 border-radius:50%;
 background:#00a884;
 border:none;color:white;font-size:18px;
}

/* EMOJI */
#emojiPicker{
 display:none;
 position:absolute;
 bottom:70px;
 background:white;
 padding:10px;
 border-radius:10px;
 box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* MOBILE */
@media(max-width:768px){
 #sidebar{display:none}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox">
<div class="card">
<h2 id="title">Login</h2>

<input id="name" placeholder="Name" style="display:none;">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button id="signupBtn" style="display:none;">Create</button>

<p><span id="toggleBtn" style="color:#00a884;cursor:pointer">Create account</span></p>
</div>
</div>

<!-- APP -->
<div id="main">

<div id="sidebar">
<h3 style="padding:10px">Chats</h3>
<div id="userList"></div>
</div>

<div id="chatArea">

<div id="topbar">
<div style="display:flex;align-items:center;gap:10px;">
<div class="avatar" id="avatar">U</div>
<div>
<div id="chatUser">Select user</div>
<div id="status"></div>
</div>
</div>
<button id="logoutBtn">Logout</button>
</div>

<div id="typing" style="font-size:12px;padding-left:10px"></div>

<div id="chat"></div>

<div id="inputBox">
<span id="emojiBtn">😊</span>
<input id="msg" placeholder="Type a message">
<button id="sendBtn">➤</button>
</div>

<div id="emojiPicker">😀 😂 😍 😎 👍 ❤️ 🎉</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, off, update, onDisconnect } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyDLkDt92C9EYRcBC1TTntg8zCtwibCfLLw",
 authDomain:"varschatapp.firebaseapp.com",
 databaseURL:"https://varschatapp-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId:"varschatapp"
});

const db=getDatabase(app);
const auth=getAuth(app);

let uid,currentUser,chatRef,typingRef,statusRef;
let sending=false; // FIX duplicate

loginBtn.onclick=()=>signInWithEmailAndPassword(auth,email.value,pass.value).catch(e=>alert(e.message));

signupBtn.onclick=async()=>{
 let res=await createUserWithEmailAndPassword(auth,email.value,pass.value);
 await set(ref(db,"users/"+res.user.uid),{name:name.value});
};

onAuthStateChanged(auth,user=>{
 if(user){
  uid=user.uid;
  authBox.style.display="none";
  main.style.display="flex";

  const sRef=ref(db,"status/"+uid);
  set(sRef,{online:true,lastSeen:Date.now()});
  onDisconnect(sRef).set({online:false,lastSeen:Date.now()});

  loadUsers();
 }
});

function loadUsers(){
 onValue(ref(db,"users"),snap=>{
  userList.innerHTML="";
  snap.forEach(s=>{
   if(s.key!==uid){
    let u=s.val();
    let div=document.createElement("div");
    div.className="user";

    div.innerHTML=`
      <div class="avatar">${u.name[0]}</div>
      <div>${u.name}</div>
      <div class="dot"></div>
    `;

    div.onclick=()=>{
     currentUser=s.key;
     chatUser.innerText=u.name;
     avatar.innerText=u.name[0];
     loadChat();
     listenStatus();
     listenTyping();
    };

    userList.appendChild(div);
   }
  });
 });
}

/* FIX STATUS */
function listenStatus(){
 if(statusRef) off(statusRef);
 statusRef=ref(db,"status/"+currentUser);

 onValue(statusRef,s=>{
  let d=s.val();
  if(!d)return;
  status.innerText=d.online?"Online":"Last seen "+new Date(d.lastSeen).toLocaleTimeString();
 });
}

/* TYPING */
msg.oninput=()=>{
 if(!currentUser)return;
 let chatId=[uid,currentUser].sort().join("_");
 set(ref(db,"typing/"+chatId+"/"+uid),true);
 setTimeout(()=>set(ref(db,"typing/"+chatId+"/"+uid),false),800);
};

function listenTyping(){
 let chatId=[uid,currentUser].sort().join("_");
 if(typingRef) off(typingRef);
 typingRef=ref(db,"typing/"+chatId);

 onValue(typingRef,s=>{
  let d=s.val();
  if(d){
   for(let k in d){
    if(k!==uid && d[k]){
     typing.innerText="Typing...";
     return;
    }
   }
  }
  typing.innerText="";
 });
}

/* FIX SEND */
sendBtn.onclick=async()=>{
 if(!currentUser || sending) return;

 let text=msg.value.trim();
 if(!text)return;

 sending=true;

 let chatId=[uid,currentUser].sort().join("_");
 let id=uid+"_"+Date.now();

 await set(ref(db,"messages/"+chatId+"/"+id),{
  text,sender:uid,time:Date.now(),seen:false
 });

 msg.value="";
 setTimeout(()=>sending=false,400);
};

/* ENTER FIX */
msg.addEventListener("keypress",e=>{
 if(e.key==="Enter"){
  e.preventDefault();
  sendBtn.click();
 }
});

function loadChat(){
 let chatId=[uid,currentUser].sort().join("_");
 if(chatRef) off(chatRef);

 chatRef=ref(db,"messages/"+chatId);

 onValue(chatRef,snap=>{
  chat.innerHTML="";
  let data=snap.val();
  if(!data)return;

  Object.keys(data).forEach(key=>{
   let m=data[key];

   let div=document.createElement("div");
   div.className="msg "+(m.sender===uid?"me":"other");

   div.innerHTML=`
    ${m.text}
    <div class="meta">${new Date(m.time).toLocaleTimeString()} ${m.sender===uid?(m.seen?"✔✔":"✔"):""}</div>
   `;

   if(m.sender!==uid){
    update(ref(db,"messages/"+chatId+"/"+key),{seen:true});
   }

   chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
 });
}

emojiBtn.onclick=()=>emojiPicker.style.display="block";
emojiPicker.onclick=e=>msg.value+=e.target.innerText;

logoutBtn.onclick=()=>{
 signOut(auth);
 location.reload();
};
</script>

</body>
</html>
