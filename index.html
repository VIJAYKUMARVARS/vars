<!DOCTYPE html>
<html>
<head>
<title>VarsChat 💬</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:sans-serif;background:#e5ddd5;height:100vh}

/* LAYOUT */
#main{display:flex;height:100vh}

/* SIDEBAR */
#sidebar{
 width:30%;
 background:#fff;
 border-right:1px solid #ddd;
 overflow:auto;
}
#sidebar h3{padding:10px;margin:0}

/* USER */
.user{
 padding:12px;
 border-bottom:1px solid #eee;
 cursor:pointer;
}
.user:hover{background:#f5f5f5}

/* CHAT AREA */
#chatArea{
 flex:1;
 display:flex;
 flex-direction:column;
}

/* TOP */
#topbar{
 display:flex;
 justify-content:space-between;
 padding:10px;
 background:#f0f2f5;
}

.avatar{
 width:40px;height:40px;
 border-radius:50%;
 background:#00a884;
 color:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
}

#status{font-size:12px;color:#666}

/* CHAT */
#chat{
 flex:1;
 overflow:auto;
 padding:10px;
 display:flex;
 flex-direction:column;
 background:#efeae2;
}

/* MESSAGE */
.msg{
 max-width:70%;
 padding:8px 10px;
 margin:4px 0;
 border-radius:10px;
}

.me{background:#d9fdd3;align-self:flex-end}
.other{background:#fff;align-self:flex-start}

.meta{
 font-size:10px;
 margin-left:6px;
 color:#666;
}

.blue{color:#34b7f1}

/* INPUT */
#inputBox{
 display:flex;
 padding:10px;
 background:#f0f2f5;
}
#msg{
 flex:1;
 padding:10px;
 border-radius:25px;
 border:none;
}
#sendBtn{
 width:45px;height:45px;
 border-radius:50%;
 border:none;
 background:#00a884;
 color:#fff;
}

/* LOGIN */
#authBox{
 position:fixed;inset:0;
 display:flex;justify-content:center;align-items:center;
 background:#e5ddd5;
}
.card{
 width:300px;
 background:#fff;
 padding:20px;
 border-radius:10px;
}
.card input{width:100%;padding:10px;margin:6px 0}
.card button{width:100%;padding:10px;margin-top:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox">
<div class="card">
<h2 id="title">Login</h2>

<input id="name" placeholder="Name" style="display:none">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button id="signupBtn" style="display:none">Create Account</button>

<p id="toggleBtn">Create account</p>
</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div id="sidebar">
<h3>Chats</h3>
<div id="userList"></div>
</div>

<div id="chatArea">

<div id="topbar">
<div style="display:flex;gap:10px">
<div class="avatar" id="avatar">U</div>
<div>
<div id="chatUser"></div>
<div id="status"></div>
</div>
</div>
<button onclick="logout()">Logout</button>
</div>

<div id="chat"></div>

<div id="inputBox">
<input id="msg">
<button id="sendBtn">➤</button>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyDLkDt92C9EYRcBC1TTntg8zCtwibCfLLw",
 authDomain:"varschatapp.firebaseapp.com",
 databaseURL:"https://varschatapp-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId:"varschatapp"
});

const db=getDatabase(app);
const auth=getAuth(app);

let uid,currentUser;

/* TOGGLE */
toggleBtn.onclick=()=>{
 if(title.innerText==="Login"){
  title.innerText="Create Account";
  name.style.display="block";
  signupBtn.style.display="block";
  loginBtn.style.display="none";
 }else{
  title.innerText="Login";
  name.style.display="none";
  signupBtn.style.display="none";
  loginBtn.style.display="block";
 }
};

/* LOGIN */
loginBtn.onclick=()=>signInWithEmailAndPassword(auth,email.value,pass.value);

/* SIGNUP */
signupBtn.onclick=async()=>{
 let res=await createUserWithEmailAndPassword(auth,email.value,pass.value);
 await set(ref(db,"users/"+res.user.uid),{name:name.value});
};

/* AUTH */
onAuthStateChanged(auth,user=>{
 if(user){
  uid=user.uid;
  authBox.style.display="none";
  main.style.display="flex";
  loadUsers();
 }
});

/* USERS */
function loadUsers(){
 onValue(ref(db,"users"),snap=>{
  userList.innerHTML="";
  snap.forEach(s=>{
   if(s.key!==uid){
    let u=s.val();
    let div=document.createElement("div");
    div.className="user";
    div.innerText=u.name;

    div.onclick=()=>{
     currentUser=s.key;
     chatUser.innerText=u.name;
     avatar.innerText=u.name[0];
     loadChat();
    };

    userList.appendChild(div);
   }
  });
 });
}

/* SEND */
sendBtn.onclick=()=>{
 if(!currentUser)return;

 let chatId=[uid,currentUser].sort().join("_");

 set(ref(db,"messages/"+chatId+"/"+Date.now()),{
  text:msg.value,
  sender:uid,
  time:Date.now(),
  seen:false
 });

 msg.value="";
};

/* CHAT */
function loadChat(){
 let chatId=[uid,currentUser].sort().join("_");

 onValue(ref(db,"messages/"+chatId),snap=>{
  chat.innerHTML="";
  let data=snap.val();
  if(!data)return;

  Object.keys(data).forEach(k=>{
   let m=data[k];

   let tick="";
   if(m.sender===uid){
    tick = m.seen ? "<span class='blue'>✔✔</span>" : "✔";
   }

   let div=document.createElement("div");
   div.className="msg "+(m.sender===uid?"me":"other");

   div.innerHTML=`
    ${m.text}
    <span class="meta">
     ${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
     ${tick}
    </span>
   `;

   if(m.sender!==uid){
    update(ref(db,"messages/"+chatId+"/"+k),{seen:true});
   }

   chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
 });
}

/* LOGOUT */
function logout(){
 signOut(auth);
 location.reload();
}
</script>

</body>
</html>
